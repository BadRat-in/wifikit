name: Release

# Cut a PyPI release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# hatch-vcs turns the tag into the package version; uv builds and publishes to
# PyPI using the PYPI_API_TOKEN repo secret, then a GitHub Release is created.
# Deliberately uses only uv + the gh CLI (no third-party publish action) so the
# job doesn't depend on resolving a flaky external Docker action.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build, publish to PyPI, and create a GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so hatch-vcs can read the version

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --repo "${GITHUB_REPOSITORY}"
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          dist/*
