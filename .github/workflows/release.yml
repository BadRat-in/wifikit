name: Release

# Cut a PyPI release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# hatch-vcs turns the tag into the package version, and the package is published
# to PyPI via Trusted Publishing (OIDC) — no API token is stored in the repo.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so hatch-vcs can read the version

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build
        run: uv build

      - name: Show built version
        run: ls -l dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing needs the environment + id-token permission. Configure a
    # matching "pending publisher" on PyPI (project wifikit, this repo, workflow
    # release.yml, environment pypi) before the first tag push.
    environment:
      name: pypi
      url: https://pypi.org/p/wifikit
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --repo "${GITHUB_REPOSITORY}"
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          dist/*
